<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>N's Weather App</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00f2fe);
  color:white;
}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  width:280px;
  text-align:center;
}

input,button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
}

button{
  cursor:pointer;
}

.temp{
  font-size:40px;
}
</style>
</head>

<body>

<div class="card">

  <h2>Weather App</h2>

  <input id="city" placeholder="Enter city">

  <br>

  <button onclick="getWeather()">Search</button>

  <h3 id="name"></h3>

  <div class="temp" id="temp"></div>

  <div id="desc"></div>

  <img id="icon">

</div>

<script>

const API = "https://weather-n-backend.onrender.com";

async function getWeather(){

  let city = document.getElementById("city").value;

  if(city===""){
    alert("Enter city name");
    return;
  }

  const res = await fetch(`${API}/weather?city=${city}`);
  const data = await res.json();

  display(data);
}

function display(data){

  if(data.cod==="404"){
    alert("City not found");
    return;
  }

  document.getElementById("name").innerText = data.name;

  document.getElementById("temp").innerText =
    data.main.temp + " °C";

  document.getElementById("desc").innerText =
    data.weather[0].description;

  document.getElementById("icon").src =
   `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

  changeBg(data.weather[0].main);
}

function changeBg(weather){

  if(weather==="Clear")
    document.body.style.background="linear-gradient(to right,#f7971e,#ffd200)";

  else if(weather==="Rain")
    document.body.style.background="linear-gradient(to right,#4e54c8,#8f94fb)";

  else if(weather==="Clouds")
    document.body.style.background="linear-gradient(to right,#bdc3c7,#2c3e50)";

  else
    document.body.style.background="linear-gradient(to right,#00c6ff,#0072ff)";
}

</script>

</body>
</html>
